name: Publish

on:
    push:
        tags:
            - "v*"

permissions:
    id-token: write
    contents: read

jobs:
    test:
        uses: ./.github/workflows/test.yml
        permissions:
            contents: read
        with:
            ref: ${{ github.ref }}

    publish:
        needs: test
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - run: pnpm build

            - run: pnpm publish --no-git-checks
